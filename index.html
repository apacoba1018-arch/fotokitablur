<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend Foto Kita Blur (Offline Audio)</title>
    
    <!-- Pustaka MediaPipe Google untuk Deteksi Tangan -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="h-screen w-full flex flex-col md:flex-row p-4 gap-4 box-border bg-slate-950 text-slate-50 overflow-hidden">

    <!-- BAGIAN KIRI: Preview Kamera Besar -->
    <div class="w-full md:w-2/3 lg:w-3/4 bg-black rounded-2xl relative flex items-center justify-center overflow-hidden border-4 border-slate-800 shadow-2xl h-full">
        
        <!-- Status Loading -->
        <div id="status_message" class="absolute z-10 text-white font-semibold text-xl animate-pulse bg-slate-900/80 px-6 py-3 rounded-xl border border-slate-700">
            Memuat Kamera & AI...
        </div>
        
        <!-- Overlay Hitung Mundur -->
        <div id="countdown_overlay" class="absolute inset-0 bg-black/70 z-20 hidden flex flex-col items-center justify-center backdrop-blur-md">
            <span id="countdown_text" class="text-[15rem] font-extrabold text-pink-500 drop-shadow-[0_0_30px_rgba(236,72,153,0.6)]">3</span>
            <p class="text-2xl text-slate-200 mt-4 font-medium tracking-wide">Bersiaplah di Depan Kamera!</p>
        </div>

        <!-- Video Tersembunyi (Input Stream) -->
        <video id="input_video" class="hidden" autoplay playsinline></video>
        
        <!-- Canvas Utama -->
        <canvas id="output_canvas" width="1280" height="720" class="w-full h-full object-cover hidden"></canvas>
    </div>

    <!-- BAGIAN KANAN: Panel Kontrol & Teks -->
    <div class="w-full md:w-1/3 lg:w-1/4 bg-slate-900 p-6 rounded-2xl shadow-2xl border border-slate-800 flex flex-col justify-between h-full overflow-y-auto">
        
        <div>
            <!-- Jam Digital -->
            <div class="flex justify-end mb-6">
                <div id="clock_display" class="bg-slate-950 px-4 py-2 rounded-xl text-cyan-400 font-mono text-xl border border-slate-800 shadow-inner tracking-wider">
                    00:00:00
                </div>
            </div>

            <!-- Informasi Project -->
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-rose-400 mb-4 leading-tight">✨ Trend Foto<br>Kita Blur</h1>
            <p class="text-slate-400 mb-6 text-sm leading-relaxed">
                Angkat jari <strong class="text-pink-400">Telunjuk & Tengah (Pose V ✌️)</strong> ke arah kamera untuk mengaktifkan efek blur seketika secara real-time.
            </p>
            
            <!-- Pengaturan -->
            <div class="bg-slate-800/40 p-4 rounded-xl mb-6 border border-slate-800/80">
                <h3 class="text-slate-200 font-semibold mb-3 text-sm tracking-wide uppercase">Pengaturan Kamera:</h3>
                
                <label class="flex items-center cursor-pointer group select-none">
                    <div class="relative">
                        <input type="checkbox" id="mirror_toggle" class="sr-only" checked>
                        <div class="block bg-slate-700 w-10 h-6 rounded-full transition-colors group-hover:bg-slate-600"></div>
                        <div id="mirror_dot" class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform transform translate-x-4"></div>
                    </div>
                    <div class="ml-3 text-slate-300 font-medium text-sm">Mode Cermin (Mirror)</div>
                </label>
            </div>
        </div>

        <!-- Kontrol Audio Lokal Audio MP3 -->
        <div>
            <!-- Tag Audio HTML5 untuk file lokal -->
            <audio id="bg_music" preload="auto">
                <source src="lagu.mp3" type="audio/mpeg">
            </audio>
            
            <p id="audio_status" class="text-xs text-slate-500 mb-3 text-center tracking-wide font-medium">Memeriksa sistem kamera...</p>

            <button id="start_btn" disabled class="w-full bg-gradient-to-r from-pink-600 to-rose-600 hover:from-pink-500 hover:to-rose-500 disabled:from-slate-800 disabled:to-slate-800 disabled:text-slate-500 disabled:cursor-not-allowed text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-all transform hover:scale-[1.02] active:scale-95 text-lg flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Mulai Trend
            </button>
        </div>
    </div>

    <!-- Memuat Logic Utama -->
    <script src="js/script.js"></script>
</body>
</html>
